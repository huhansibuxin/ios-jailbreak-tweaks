name: Build HideDoubaoPiP

on:
  push:
    branches: [main, master]
    paths:
      - 'plugins/hide-doubao-pip/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive --depth 1 https://github.com/theos/theos.git $THEOS

      - name: Install SDK
        run: |
          cd $HOME/theos/sdks
          curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip -q master.zip
          cp -r sdks-master/iPhoneOS16.5.sdk .
          rm -rf sdks-master master.zip

      - name: Install ldid
        run: brew install ldid

      - name: Build
        run: |
          export THEOS=$HOME/theos
          cd plugins/hide-doubao-pip
          make clean
          make package FINALPACKAGE=1

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: HideDoubaoPiP-deb
          path: plugins/hide-doubao-pip/packages/*.deb
          retention-days: 7
          if-no-files-found: error
